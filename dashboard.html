<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Fish Invest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <nav>
        <h1>Fish Invest</h1>
        <div class = "card">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="challenges.html">Challenges</a>
            <a href="market.html">Market</a>
        </div>
    </nav>
    
    <main class="container">

    <div class="dashboard-grid">    

      <div class = "card">
          <p class="header">Portfolio</p>
          <p>Buying power: <span id="fish">10000 Fish</span></p>
          <p>investments: <span id="investments">0 Fish</span></p>
          <p>Total Fish (balance + investments): <span id="total">10000</span></p>
      </div>

      <div class = "card">
          <p class="header">Your Performance</p>
          <p>Change: <span id="percent">0%</span></p>
          <p>Profit: <span id="profit">0 Fish</span></p>
          <p>Challenges Completed: <span id="challegesCompleted">0/10</span></p>
     </div>

     <div class = "card">
          <p class="header">Market</p>
          <nav class="market.link">
           <a href="market.html">Dive into the ocean</a>
          </nav>
     </div> 

     <div class = "card">
          <p class="header">Reset The Market</p>
          <p>button will go here</p>
     </div>

    
        
   </div>
    
   </main>

    <script src="script.js"></script>
</body>
</html>
